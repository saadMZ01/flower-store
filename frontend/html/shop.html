<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — Bloom & Co</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #faf7f2; --dark: #1a1410; --rose: #c9736a;
      --rose-light: #e8b4ad; --text: #3a2e28; --muted: #9a8a7e; --border: #e8e0d8;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); overflow-x: hidden; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.4rem 4rem; background: rgba(250,247,242,0.93);
      backdrop-filter: blur(14px); border-bottom: 1px solid var(--border);
    }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; color: var(--dark); text-decoration: none; }
    .nav-logo span { color: var(--rose); font-style: italic; }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); text-decoration: none; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--rose); }
    .nav-cart { background: var(--dark); color: var(--cream); border: none; padding: 0.6rem 1.4rem; font-family: 'Jost', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; display: inline-block; }
    .nav-cart:hover { background: var(--rose); }

    /* PAGE HEADER */
    .page-header {
      padding: 8rem 6rem 3rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .page-tag { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--rose); margin-bottom: 0.6rem; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.5rem, 4vw, 4rem); font-weight: 300; color: var(--dark); line-height: 1.1; }
    .page-title em { font-style: italic; color: var(--rose); }
    .product-count { font-size: 0.82rem; color: var(--muted); }

    /* SHOP LAYOUT */
    .shop-layout { display: grid; grid-template-columns: 240px 1fr; gap: 3rem; padding: 3rem 6rem 6rem; }

    /* SIDEBAR */
    .sidebar { position: sticky; top: 100px; height: fit-content; }
    .sidebar-section { margin-bottom: 2.5rem; }
    .sidebar-title { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text); margin-bottom: 1.2rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--border); }

    /* Search */
    .search-box { position: relative; }
    .search-box input { width: 100%; padding: 0.7rem 1rem 0.7rem 2.4rem; border: 1px solid var(--border); background: #fff; font-family: 'Jost', sans-serif; font-size: 0.85rem; color: var(--text); outline: none; transition: border-color 0.2s; }
    .search-box input:focus { border-color: var(--rose); }
    .search-box input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; pointer-events: none; }

    /* Categories */
    .category-list { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; }
    .category-list li button {
      width: 100%; text-align: left; background: none; border: none;
      padding: 0.55rem 0.8rem; font-family: 'Jost', sans-serif;
      font-size: 0.84rem; color: var(--text); cursor: pointer;
      transition: background 0.2s, color 0.2s; border-radius: 4px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .category-list li button:hover { background: #f0e8e0; color: var(--rose); }
    .category-list li button.active { background: var(--rose); color: #fff; }
    .category-list li button .cat-count { font-size: 0.72rem; opacity: 0.7; }

    /* Price filter */
    .price-range { display: flex; gap: 0.5rem; align-items: center; }
    .price-range input { width: 80px; padding: 0.5rem 0.6rem; border: 1px solid var(--border); font-family: 'Jost', sans-serif; font-size: 0.82rem; color: var(--text); outline: none; }
    .price-range span { color: var(--muted); font-size: 0.82rem; }
    .btn-filter { margin-top: 0.8rem; width: 100%; padding: 0.6rem; background: var(--dark); color: var(--cream); border: none; font-family: 'Jost', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn-filter:hover { background: var(--rose); }

    /* PRODUCTS AREA */
    .shop-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.8rem; }
    .sort-select { padding: 0.5rem 1rem; border: 1px solid var(--border); background: #fff; font-family: 'Jost', sans-serif; font-size: 0.82rem; color: var(--text); outline: none; cursor: pointer; }

    .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.4rem; }

    .product-card { background: #fff; border: 1px solid var(--border); transition: transform 0.3s, box-shadow 0.3s; text-decoration: none; color: inherit; display: block; animation: fadeUp 0.5s ease both; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(26,20,16,0.08); }
    .product-img { height: 220px; background: #f0e8e0; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .product-img svg { transition: transform 0.4s; }
    .product-card:hover .product-img svg { transform: scale(1.08); }
    .product-badge { position: absolute; top: 1rem; left: 1rem; background: var(--rose); color: #fff; font-size: 0.62rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.22rem 0.55rem; }
    .out-badge { background: var(--muted); }
    .product-info { padding: 1.2rem; }
    .product-category { font-size: 0.65rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .product-name { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; color: var(--dark); margin-bottom: 0.3rem; }
    .product-desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-bottom: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-footer { display: flex; align-items: center; justify-content: space-between; }
    .product-price { font-size: 1rem; font-weight: 500; color: var(--rose); }
    .product-add { background: none; border: 1px solid var(--border); padding: 0.38rem 0.85rem; font-family: 'Jost', sans-serif; font-size: 0.7rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; color: var(--text); transition: background 0.2s, color 0.2s, border-color 0.2s; }
    .product-add:hover:not(:disabled) { background: var(--dark); color: var(--cream); border-color: var(--dark); }
    .product-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* EMPTY / LOADING */
    .state-msg { grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--muted); font-size: 1rem; }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--dark); color: var(--cream); padding: 0.9rem 1.6rem; font-size: 0.82rem; letter-spacing: 0.06em; z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s; pointer-events: none; }
    .toast.show { transform: translateY(0); opacity: 1; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Bloom <span>&</span> Co</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html" class="active">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <a href="cart.html" class="nav-cart">Cart (<span id="cart-count">0</span>)</a>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div>
      <p class="page-tag">Our collection</p>
      <h1 class="page-title">Fresh <em>flowers</em><br>for every moment</h1>
    </div>
    <p class="product-count" id="product-count">Loading...</p>
  </div>

  <!-- SHOP LAYOUT -->
  <div class="shop-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">

      <div class="sidebar-section">
        <p class="sidebar-title">Search</p>
        <div class="search-box">
          <span class="search-icon">⌕</span>
          <input type="text" id="search-input" placeholder="Search flowers..." oninput="filterProducts()"/>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-title">Categories</p>
        <ul class="category-list" id="category-list">
          <li><button class="active" onclick="selectCategory('all', this)">All flowers <span class="cat-count" id="count-all">0</span></button></li>
        </ul>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-title">Price range</p>
        <div class="price-range">
          <input type="number" id="price-min" placeholder="Min" min="0"/>
          <span>—</span>
          <input type="number" id="price-max" placeholder="Max" min="0"/>
        </div>
        <button class="btn-filter" onclick="filterProducts()">Apply filter</button>
        <button class="btn-filter" style="margin-top:0.4rem;background:var(--muted);" onclick="clearFilters()">Clear</button>
      </div>

    </aside>

    <!-- PRODUCTS -->
    <div>
      <div class="shop-top">
        <p style="font-size:0.82rem;color:var(--muted);" id="results-label"></p>
        <select class="sort-select" onchange="sortProducts(this.value)">
          <option value="default">Sort: Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A–Z</option>
        </select>
      </div>
      <div class="products-grid" id="products-grid">
        <p class="state-msg">Loading flowers...</p>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
const API = 'https://your-railway-url.up.railway.app/api';
    let allProducts   = [];
    let allCategories = [];
    let activeCategory = 'all';
    let currentSort    = 'default';

    // ── Load data ──
    async function init() {
      try {
        const [products, categories] = await Promise.all([
          fetch(API + '/products').then(r => r.json()),
          fetch(API + '/products').then(r => r.json())
        ]);
        allProducts = products;
        buildCategories(products);
        renderProducts(products);
        updateCartCount();
      } catch {
        document.getElementById('products-grid').innerHTML = '<p class="state-msg">Could not load products. Make sure your server is running.</p>';
      }
    }

    function buildCategories(products) {
      const counts = {};
      products.forEach(p => {
        const cat = p.category_id;
        counts[cat] = (counts[cat] || 0) + 1;
      });
      document.getElementById('count-all').textContent = products.length;

      const catNames = { 1:'Roses', 2:'Bouquets', 3:'Succulents', 4:'Seasonal' };
      const list = document.getElementById('category-list');
      Object.entries(counts).forEach(([id, count]) => {
        const name = catNames[id] || 'Category ' + id;
        const li   = document.createElement('li');
        li.innerHTML = `<button onclick="selectCategory('${id}', this)">${name} <span class="cat-count">${count}</span></button>`;
        list.appendChild(li);
      });
    }

    function selectCategory(cat, btn) {
      activeCategory = cat;
      document.querySelectorAll('.category-list button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterProducts();
    }

    function filterProducts() {
      const q      = document.getElementById('search-input').value.toLowerCase();
      const minVal = parseFloat(document.getElementById('price-min').value) || 0;
      const maxVal = parseFloat(document.getElementById('price-max').value) || Infinity;

      let filtered = allProducts.filter(p => {
        const matchCat  = activeCategory === 'all' || String(p.category_id) === String(activeCategory);
        const matchQ    = p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
        const matchPrice = p.price >= minVal && p.price <= maxVal;
        return matchCat && matchQ && matchPrice;
      });

      filtered = sortList(filtered, currentSort);
      renderProducts(filtered);
    }

    function sortProducts(val) {
      currentSort = val;
      filterProducts();
    }

    function sortList(list, val) {
      return [...list].sort((a, b) => {
        if (val === 'price-asc')  return a.price - b.price;
        if (val === 'price-desc') return b.price - a.price;
        if (val === 'name-asc')   return a.name.localeCompare(b.name);
        return 0;
      });
    }

    function clearFilters() {
      document.getElementById('search-input').value = '';
      document.getElementById('price-min').value    = '';
      document.getElementById('price-max').value    = '';
      activeCategory = 'all';
      document.querySelectorAll('.category-list button').forEach((b,i) => b.classList.toggle('active', i===0));
      filterProducts();
    }

    function renderProducts(list) {
      const grid = document.getElementById('products-grid');
      document.getElementById('product-count').textContent = list.length + ' products';
      document.getElementById('results-label').textContent = 'Showing ' + list.length + ' flowers';

      if (!list.length) {
        grid.innerHTML = '<p class="state-msg">No flowers found. Try a different search or filter.</p>';
        return;
      }

      const catNames = { 1:'Roses', 2:'Bouquets', 3:'Succulents', 4:'Seasonal' };
      grid.innerHTML = list.map((p, i) => `
        <div class="product-card" style="animation-delay:${i * 0.06}s">
          <div class="product-img">
            ${p.is_featured ? '<span class="product-badge">Featured</span>' : ''}
            ${p.stock_qty === 0 ? '<span class="product-badge out-badge">Sold out</span>' : ''}
            <svg width="90" height="90" viewBox="0 0 200 200" opacity="0.22">
              <circle cx="100" cy="100" r="20" fill="#c9736a"/>
              <ellipse cx="100" cy="55" rx="15" ry="30" fill="#e8b4ad"/>
              <ellipse cx="100" cy="145" rx="15" ry="30" fill="#e8b4ad"/>
              <ellipse cx="55" cy="100" rx="30" ry="15" fill="#e8b4ad"/>
              <ellipse cx="145" cy="100" rx="30" ry="15" fill="#e8b4ad"/>
              <ellipse cx="70" cy="70" rx="15" ry="30" fill="#d4a0a0" transform="rotate(-45 70 70)"/>
              <ellipse cx="130" cy="70" rx="15" ry="30" fill="#d4a0a0" transform="rotate(45 130 70)"/>
              <ellipse cx="70" cy="130" rx="15" ry="30" fill="#d4a0a0" transform="rotate(45 70 130)"/>
              <ellipse cx="130" cy="130" rx="15" ry="30" fill="#d4a0a0" transform="rotate(-45 130 130)"/>
            </svg>
          </div>
          <div class="product-info">
            <p class="product-category">${catNames[p.category_id] || 'Flowers'}</p>
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.description || 'Fresh and beautiful.'}</p>
            <div class="product-footer">
              <span class="product-price">$${parseFloat(p.price).toFixed(2)}</span>
              <button class="product-add" ${p.stock_qty === 0 ? 'disabled' : ''} onclick="addToCart(${p.id},'${p.name}',${p.price})">
                ${p.stock_qty === 0 ? 'Sold out' : 'Add to cart'}
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ── Cart ──
    function getCart()  { return JSON.parse(localStorage.getItem('cart') || '[]'); }
    function saveCart(c) {
      localStorage.setItem('cart', JSON.stringify(c));
      document.getElementById('cart-count').textContent = c.reduce((s,i) => s+i.qty, 0);
    }
    function updateCartCount() { saveCart(getCart()); }

    function addToCart(id, name, price) {
      const c  = getCart();
      const ex = c.find(i => i.id === id);
      if (ex) ex.qty++; else c.push({ id, name, price, qty: 1 });
      saveCart(c);
      showToast('"' + name + '" added to cart!');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    init();
  </script>
</body>
</html>
